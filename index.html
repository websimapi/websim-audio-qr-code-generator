<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio QR Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Audio QR</h1>
            <p>Record audio and generate QR codes</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" data-tab="record">Record</button>
            <button class="tab-btn" data-tab="scan">Scan</button>
        </div>

        <div class="tab-content active" id="record">
            <div class="card">
                <div class="record-section">
                    <button class="record-btn" id="recordBtn">
                        <img src="icon-record.png" alt="Record" id="recordIcon">
                    </button>
                    <div class="timer">
                        <div class="progress-bar">
                            <div class="progress" id="progress"></div>
                        </div>
                        <span id="timeDisplay">0.0s / 2.0s</span>
                    </div>
                </div>
                
                <div class="message" id="message"></div>
                
                <div class="qr-section" id="qrSection">
                    <canvas id="qrCanvas"></canvas>
                    <button class="download-btn" id="downloadBtn">Download QR Code</button>
                </div>
            </div>
        </div>

        <div class="tab-content" id="scan">
            <div class="card">
                <div class="scan-section">
                    <video id="video" autoplay muted playsinline></video>
                    <canvas id="scanCanvas"></canvas>
                </div>
                <div class="message" id="scanMessage"></div>
                <div class="audio-section" id="audioSection">
                    <audio controls id="audioPlayer"></audio>
                </div>
            </div>
        </div>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "qrcode": "https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js",
            "jsqr": "https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"
        }
    }
    </script>
    <script type="module" src="script.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
